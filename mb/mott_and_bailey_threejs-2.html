<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motte and Bailey Castle - Walkthrough</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #instructions {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      font-family: sans-serif;
      z-index: 1;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="instructions">
  Click to lock pointer.<br>
  WASD = walk, Arrow keys = run faster<br>
  Mouse = look, N = toggle day/night
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.110.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.110.0/examples/js/controls/PointerLockControls.js"></script>

<script>
  // Scene setup
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // --- Day / Night Lighting ---
  let isNight = false;

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
  sunLight.position.set(100, 200, 100);
  scene.add(sunLight);

  function setDay() {
    scene.background = new THREE.Color(0x87ceeb);
    ambientLight.intensity = 0.5;
    sunLight.intensity = 0.8;
  }

  function setNight() {
    scene.background = new THREE.Color(0x02030a);
    ambientLight.intensity = 0.15;
    sunLight.intensity = 0.2;
  }

  setDay();

  // Ground
  const groundGeo = new THREE.PlaneGeometry(800, 800);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d3a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // Controls
  const controls = new THREE.PointerLockControls(camera, document.body);
  const instructions = document.getElementById('instructions');
  instructions.addEventListener('click', () => controls.lock());
  scene.add(controls.getObject());

  let moveForward = false;
  let moveBackward = false;
  let moveLeft = false;
  let moveRight = false;
  let runForward = false;
  let runBackward = false;
  let runLeft = false;
  let runRight = false;

  const velocity = new THREE.Vector3();
  const direction = new THREE.Vector3();

  function onKeyDown(event) {
    switch (event.code) {
      case 'KeyW': moveForward = true; break;
      case 'KeyA': moveLeft = true; break;
      case 'KeyS': moveBackward = true; break;
      case 'KeyD': moveRight = true; break;

      case 'ArrowUp': runForward = true; break;
      case 'ArrowLeft': runLeft = true; break;
      case 'ArrowDown': runBackward = true; break;
      case 'ArrowRight': runRight = true; break;

      case 'KeyN':
        isNight = !isNight;
        isNight ? setNight() : setDay();
        break;
    }
  }

  function onKeyUp(event) {
    switch (event.code) {
      case 'KeyW': moveForward = false; break;
      case 'KeyA': moveLeft = false; break;
      case 'KeyS': moveBackward = false; break;
      case 'KeyD': moveRight = false; break;

      case 'ArrowUp': runForward = false; break;
      case 'ArrowLeft': runLeft = false; break;
      case 'ArrowDown': runBackward = false; break;
      case 'ArrowRight': runRight = false; break;
    }
  }

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);

  // --- Build the Motte ---
  const motteGeo = new THREE.CylinderGeometry(50, 80, 40, 32);
  const motteMat = new THREE.MeshLambertMaterial({ color: 0x8b6b3e });
  const motte = new THREE.Mesh(motteGeo, motteMat);
  motte.position.set(-120, 20, 0);
  scene.add(motte);

  // Stone keep
  const keepGeo = new THREE.BoxGeometry(40, 40, 40);
  const keepMat = new THREE.MeshLambertMaterial({ color: 0x9e9e9e });
  const keep = new THREE.Mesh(keepGeo, keepMat);
  keep.position.set(-120, 60, 0);
  scene.add(keep);

  // Crenellations on keep
  for (let i = -15; i <= 15; i += 6) {
    const crenelGeo = new THREE.BoxGeometry(4, 6, 4);
    const crenelMat = new THREE.MeshLambertMaterial({ color: 0xb0b0b0 });

    const c1 = new THREE.Mesh(crenelGeo, crenelMat);
    c1.position.set(-120 + i, 83, -20);
    scene.add(c1);

    const c2 = new THREE.Mesh(crenelGeo, crenelMat);
    c2.position.set(-120 + i, 83, 20);
    scene.add(c2);
  }

  // --- Bailey ---
  const baileyFloorGeo = new THREE.CircleGeometry(90, 40);
  const baileyFloorMat = new THREE.MeshLambertMaterial({ color: 0x4c8a4c });
  const baileyFloor = new THREE.Mesh(baileyFloorGeo, baileyFloorMat);
  baileyFloor.rotation.x = -Math.PI / 2;
  baileyFloor.position.set(120, 0.1, 0);
  scene.add(baileyFloor);

  // Palisade wall
  function createWall(radius, height, segments) {
    const group = new THREE.Group();
    for (let i = 0; i < segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const postGeo = new THREE.BoxGeometry(3, height, 6);
      const postMat = new THREE.MeshLambertMaterial({ color: 0x6b4423 });
      const post = new THREE.Mesh(postGeo, postMat);

      post.position.set(
              120 + Math.cos(angle) * radius,
              height / 2,
              Math.sin(angle) * radius
      );
      post.rotation.y = -angle;
      group.add(post);
    }
    return group;
  }

  const baileyWall = createWall(90, 15, 100);
  scene.add(baileyWall);

  // Towers on bailey wall
  function createTower(x, z) {
    const towerGeo = new THREE.CylinderGeometry(10, 12, 30, 16);
    const towerMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const tower = new THREE.Mesh(towerGeo, towerMat);
    tower.position.set(x, 15, z);
    scene.add(tower);

    // Crenellations
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const crenelGeo = new THREE.BoxGeometry(3, 5, 3);
      const crenelMat = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
      const crenel = new THREE.Mesh(crenelGeo, crenelMat);

      crenel.position.set(
              x + Math.cos(angle) * 10,
              32,
              z + Math.sin(angle) * 10
      );
      scene.add(crenel);
    }
  }

  createTower(210, 0);
  createTower(120, 90);
  createTower(120, -90);

  // Gate
  const gateGeo = new THREE.BoxGeometry(14, 15, 6);
  const gateMat = new THREE.MeshLambertMaterial({ color: 0x4a2a12 });
  const gate = new THREE.Mesh(gateGeo, gateMat);
  gate.position.set(120, 7.5, 90);
  scene.add(gate);

  // --- Wooden Bridge between bailey and motte ---
  const bridgeGroup = new THREE.Group();

  for (let i = 0; i < 20; i++) {
    const plankGeo = new THREE.BoxGeometry(8, 1, 4);
    const plankMat = new THREE.MeshLambertMaterial({ color: 0x7b5233 });
    const plank = new THREE.Mesh(plankGeo, plankMat);

    const t = i / 19;
    plank.position.set(
            THREE.Math.lerp(-120, 120, t),
            25 - t * 15,
            0
    );
    bridgeGroup.add(plank);
  }

  scene.add(bridgeGroup);

  // Starting position
  camera.position.set(0, 6, 200);

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  let prevTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const time = performance.now();
    const delta = (time - prevTime) / 1000;

    velocity.x -= velocity.x * 10.0 * delta;
    velocity.z -= velocity.z * 10.0 * delta;

    direction.set(0, 0, 0);

    const walkSpeed = 40.0;
    const runSpeed = 90.0;

    if (moveForward) direction.z -= 1;
    if (moveBackward) direction.z += 1;
    if (moveLeft) direction.x -= 1;
    if (moveRight) direction.x += 1;

    if (runForward) direction.z -= 1;
    if (runBackward) direction.z += 1;
    if (runLeft) direction.x -= 1;
    if (runRight) direction.x += 1;

    direction.normalize();

    const usingRunKeys = runForward || runBackward || runLeft || runRight;
    const speed = usingRunKeys ? runSpeed : walkSpeed;

    if (direction.length() > 0) {
      velocity.z -= direction.z * speed * delta;
      velocity.x -= direction.x * speed * delta;
    }

    controls.moveRight(-velocity.x * delta);
    controls.moveForward(-velocity.z * delta);

    prevTime = time;
    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
